<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Analytics Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

    body { background:#0a0a0a; color:#fff; }

    header {
      display:flex; justify-content:space-between; align-items:center;
      padding:20px 40px;
      background:#000; border-bottom:1px solid rgba(255,0,0,0.2);
    }

    header h1 { color:#ff1a1a; }

    nav a {
      color:#ccc; margin-left:20px; text-decoration:none; transition:0.3s;
    }
    nav a:hover { color:#ff1a1a; }

    .container { padding:40px; }

    .stats {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
      gap:20px;
      margin-bottom:40px;
    }

    .stat-card {
      background:#111;
      padding:20px;
      border-radius:15px;
      border:1px solid rgba(255,0,0,0.2);
      box-shadow:0 0 15px rgba(255,0,0,0.1);
      transition:0.3s;
    }

    .stat-card:hover {
      transform:translateY(-5px);
      box-shadow:0 0 25px rgba(255,0,0,0.4);
    }

    .stat-card h3 { color:#ff1a1a; margin-bottom:10px; }

    .charts {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
      gap:30px;
    }

    .chart-box {
      background:#111;
      padding:20px;
      border-radius:20px;
      border:1px solid rgba(255,0,0,0.2);
      box-shadow:0 0 20px rgba(255,0,0,0.1);
    }

    .chart-box h3 {
      margin-bottom:15px;
      color:#ff1a1a;
    }

    footer {
      text-align:center;
      padding:20px;
      border-top:1px solid rgba(255,0,0,0.2);
      color:#777;
      margin-top:40px;
    }
  </style>
</head>
<body>

<header>
  <h1>AnalyticsX</h1>
  <nav>
    <a href="#">Dashboard</a>
    <a href="#">Reports</a>
    <a href="#">Insights</a>
    <a href="#">Settings</a>
  </nav>
</header>

<div class="container">

  <section class="stats">
    <div class="stat-card">
      <h3>Visitors</h3>
      <p>12,430</p>
    </div>
    <div class="stat-card">
      <h3>Revenue</h3>
      <p>$8,920</p>
    </div>
    <div class="stat-card">
      <h3>Conversions</h3>
      <p>1,204</p>
    </div>
    <div class="stat-card">
      <h3>Bounce Rate</h3>
      <p>32%</p>
    </div>
  </section>

  <section class="charts">
    <div class="chart-box">
      <h3>Traffic Overview</h3>
      <canvas id="lineChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>User Distribution</h3>
      <canvas id="pieChart"></canvas>
    </div>
  </section>

</div>

<footer>
  <p>© 2026 AnalyticsX Dashboard</p>
</footer>

<script>
  const ctx1 = document.getElementById('lineChart');
  new Chart(ctx1, {
    type: 'line',
    data: {
      labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
      datasets: [{
        label: 'Visitors',
        data: [1200,1900,3000,2500,2200,3000,4000],
        borderColor: '#ff1a1a',
        backgroundColor: 'rgba(255,0,0,0.2)',
        tension: 0.4
      }]
    }
  });

  const ctx2 = document.getElementById('pieChart');
  new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: ['Desktop','Mobile','Tablet'],
      datasets: [{
        data: [55,35,10],
        backgroundColor: ['#ff1a1a','#990000','#330000']
      }]
    }
  });
</script>

</body>
</html>
